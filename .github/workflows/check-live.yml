name: Check TikTok Live Status

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-live:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check TikTok live status
        id: check
        run: |
          RESPONSE=$(curl -s \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            "https://webcast.tiktok.com/webcast/room/info/?room_id=7640508446380378901&aid=1988")
          
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('status',0))")
          USER_COUNT=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('user_count',0))")
          TITLE=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('title','').replace('\"','').replace('
',''))")
          
          # Live = status 2 AND user_count > 0 (start_time can be 0)
          if [ "$STATUS" = "2" ] && [ "$USER_COUNT" -gt 0 ]; then
            IS_LIVE="true"
          else
            IS_LIVE="false"
          fi
          
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          echo "{\"isLive\":$IS_LIVE,\"title\":\"$TITLE\",\"viewerCount\":$USER_COUNT,\"updatedAt\":\"$NOW\"}" > status.json
          
          echo "is_live=$IS_LIVE" >> $GITHUB_OUTPUT
          echo "viewer_count=$USER_COUNT" >> $GITHUB_OUTPUT

      - name: Commit status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json
          git diff --staged --quiet || git commit -m "Live: ${{ steps.check.outputs.is_live }} | Viewers: ${{ steps.check.outputs.viewer_count }}"
          git push
