name: Check TikTok Live Status

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-live:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch and write status
        run: |
          python3 - << 'EOF'
import urllib.request, json, subprocess
from datetime import datetime, timezone

req = urllib.request.Request(
    "https://webcast.tiktok.com/webcast/room/info/?room_id=7640508446380378901&aid=1988",
    headers={"User-Agent": "Mozilla/5.0"}
)
with urllib.request.urlopen(req, timeout=10) as r:
    data = json.loads(r.read())

room = data.get("data", {})
status = room.get("status", 0)
user_count = room.get("user_count", 0)
title = room.get("title", "").replace('"', "")

is_live = status == 2 and user_count > 0
now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

result = {"isLive": is_live, "title": title, "viewerCount": user_count, "updatedAt": now}
with open("status.json", "w") as f:
    json.dump(result, f)

print(f"Live: {is_live}, Viewers: {user_count}, Title: {title}")
EOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json
          git diff --staged --quiet || git commit -m "status update"
          git push
